<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weight Tracker</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="page">
    <section class="panel">
      <div class="panel__header">
        <div>
          <p class="eyebrow">Weight Tracker</p>
          <h1>Weight Over Time</h1>
          <p class="lede">Switch between users and keep each person’s history in a separate CSV file.</p>
        </div>
        <div class="user-switcher">
          <label class="field">
            <span class="field__label">User</span>
            <select id="user-select" name="user"></select>
          </label>
        </div>
      </div>
      <form id="entry-form" class="entry-form">
        <label class="field">
          <span class="field__label">Weight (kg)</span>
          <input id="weight-input" name="weight" type="number" min="0" step="0.1" inputmode="decimal" required>
        </label>
        <label class="field">
          <span class="field__label">Date</span>
          <input id="date-input" name="date" type="date" required>
        </label>
        <label class="field">
          <span class="field__label">Time</span>
          <input id="time-input" name="time" type="time" required>
        </label>
        <button class="button" type="submit">Save weight</button>
      </form>
      <div id="status" class="status">Loading records...</div>
      <div class="chart-card">
        <div class="chart-controls">
          <button id="zoom-out" class="chart-btn" type="button" aria-label="Zoom out" disabled>−</button>
          <button id="zoom-in"  class="chart-btn" type="button" aria-label="Zoom in">+</button>
        </div>
        <svg id="chart" class="chart" viewBox="0 0 960 520" role="img" aria-label="Line chart of weight by date"></svg>
        <div id="tooltip" class="tooltip" hidden></div>
      </div>
    </section>
  </main>
  <script src="/static/config.js"></script>
  <script src="/static/script.js"></script>
</body>
</html>
