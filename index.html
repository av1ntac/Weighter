<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weight Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="panel">
      <div class="panel__header">
        <div>
          <p class="eyebrow">Weight Tracker</p>
          <h1>Weight Over Time</h1>
          <p class="lede">Load a CSV with columns: <code>date</code>, <code>time</code>, <code>weight</code>.</p>
        </div>
        <label class="upload">
          <span>Open CSV</span>
          <input id="file-input" type="file" accept=".csv,text/csv">
        </label>
      </div>
      <div id="status" class="status">Trying to load <code>data.csv</code>...</div>
      <div class="chart-card">
        <svg id="chart" class="chart" viewBox="0 0 960 520" role="img" aria-label="Line chart of weight by date"></svg>
        <div id="tooltip" class="tooltip" hidden></div>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
